<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Discover — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/narrative.css">
</head>
<body>

  <!-- Topbar (rendered by narrative.js with back button + state colour) -->
  <header id="topbar" class="topbar"></header>

  <main class="narrative-screen">

    <!-- State hero banner -->
    <div class="narrative-hero" id="narrative-hero">
      <!-- 📸 IMAGE NEEDED: assets/images/states/{stateId}-hero.png
           Export from Figma → States/{StateName}/Hero banner image
           narrative.js sets background-image when state is loaded
           Fallback is the solid state colour -->
      <div class="narrative-hero-overlay">
        <span class="narrative-hero-emoji" id="hero-emoji">🏝️</span>
        <h2 class="narrative-hero-name" id="hero-name">State Name</h2>
        <p class="narrative-hero-tagline" id="hero-tagline">Tagline</p>
      </div>
    </div>

    <!-- Tab navigation -->
    <div class="narrative-tabs">
      <button class="ntab active" data-tab="story">📖 Story</button>
      <button class="ntab" data-tab="cards">🃏 Discover</button>
      <button class="ntab" data-tab="dialect">💬 Dialect</button>
    </div>

    <!-- ── TAB: Story ── -->
    <div id="tab-story" class="ntab-content active">
      <div class="narrative-story-body">

        <div class="narrative-mascot-row">
          <!-- 📸 IMAGE NEEDED: assets/images/mascots/rimau.png (replace emoji) -->
          <div class="narrative-mascot-figure">🦁</div>
          <div class="narrative-story-bubble">
            <p id="story-mascot-text">Loading story…</p>
          </div>
        </div>

        <div class="story-text-card card">
          <p class="story-full-text" id="story-text">Loading…</p>
        </div>

        <button class="btn-primary narrative-cta" id="cta-to-cards">
          Discover More 🃏
        </button>
      </div>
    </div>

    <!-- ── TAB: Discovery cards ── -->
    <div id="tab-cards" class="ntab-content hidden">

      <div class="card-nav-row">
        <button class="card-nav-btn" id="card-prev" disabled>‹</button>
        <span class="card-counter" id="card-counter">1 / 3</span>
        <button class="card-nav-btn" id="card-next">›</button>
      </div>

      <div class="card-dots" id="card-dots">
        <!-- Dots inserted by narrative.js -->
      </div>

      <!-- Culture card -->
      <div id="card-area">
        <!-- Card HTML rendered by narrative.js -->
      </div>

      <div class="narrative-mascot-row" id="card-mascot-row">
        <div class="narrative-mascot-figure">🦁</div>
        <div class="narrative-card-bubble">
          <p id="card-mascot-text">Let's explore!</p>
        </div>
      </div>

      <button class="btn-primary narrative-cta" id="cta-to-quiz">
        🎯 Take the Quiz!
      </button>
    </div>

    <!-- ── TAB: Dialect ── -->
    <div id="tab-dialect" class="ntab-content hidden">

      <div class="dialect-card card">
        <div class="dialect-icon">💬</div>
        <h3 class="dialect-word" id="dialect-word">"—"</h3>
        <p class="dialect-pronunciation" id="dialect-pron">/—/</p>
        <p class="dialect-meaning" id="dialect-meaning">Loading…</p>
        <div class="dialect-region-badge" id="dialect-badge">dialect</div>
      </div>

      <div class="dialect-fun-fact card">
        <h4>Did you know?</h4>
        <p>Malaysia has many different languages and dialects! Each state has its own unique words and expressions passed down through generations.</p>
      </div>

      <button class="btn-primary narrative-cta" id="cta-to-activity">
        🎮 Try an Activity!
      </button>
    </div>

  </main>

  <script type="module" src="../js/narrative.js"></script>
</body>
</html>
