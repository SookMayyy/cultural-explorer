<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Teacher Dashboard — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/teacher.css">
</head>
<body>

  <!-- Topbar (with back button to home) -->
  <header id="topbar" class="topbar"></header>

  <main class="teacher-screen">

    <!-- Hero -->
    <div class="teacher-hero">
      <div class="teacher-hero-content">
        <span class="teacher-icon">🏫</span>
        <div>
          <h2 class="teacher-class-name" id="class-name">Year 5 Bestari</h2>
          <p class="teacher-subtitle" id="class-size">6 students</p>
        </div>
      </div>
      <div class="demo-warning">
        ⚠️ Demo data — connect backend for live class data
      </div>
    </div>

    <!-- Class PIN card -->
    <div class="class-pin-card card">
      <div class="pin-card-top">
        <span class="pin-card-label">Class PIN</span>
        <button class="pin-copy-btn" id="copy-pin">📋 Copy</button>
      </div>
      <div class="pin-display" id="class-pin">123456</div>
      <p class="pin-hint">Share this PIN with students to join your class</p>
    </div>

    <!-- Overview stats -->
    <div class="teacher-stats-row">
      <div class="teacher-stat">
        <span class="tstat-val" id="tstat-students">6</span>
        <span class="tstat-label">Students</span>
      </div>
      <div class="teacher-stat">
        <span class="tstat-val" id="tstat-avg-pts">—</span>
        <span class="tstat-label">Avg. Points</span>
      </div>
      <div class="teacher-stat">
        <span class="tstat-val" id="tstat-avg-stamps">—</span>
        <span class="tstat-label">Avg. Stamps</span>
      </div>
    </div>

    <!-- Student roster -->
    <div class="teacher-section">
      <h3 class="teacher-section-heading">Student Roster</h3>
      <div class="roster-table">
        <div class="roster-header">
          <span>Name</span>
          <span>Stamps</span>
          <span>Points</span>
        </div>
        <div id="roster-rows">
          <!-- Rows rendered by teacher.js -->
        </div>
      </div>
    </div>

    <!-- State completion breakdown -->
    <div class="teacher-section">
      <h3 class="teacher-section-heading">State Completion</h3>
      <div id="state-agg-list">
        <!-- Rendered by teacher.js -->
      </div>
    </div>

    <!-- Export + logout -->
    <div class="teacher-section">
      <button class="btn-primary teacher-export-btn" id="teacher-export">
        📥 Export Report (CSV)
      </button>
      <button class="btn-ghost" id="teacher-logout">Log out</button>
    </div>

  </main>

  <script type="module" src="../js/teacher.js"></script>
</body>
</html>
