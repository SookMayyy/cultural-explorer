<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Cultural Explorer Malaysia - Learn about Malaysian states through fun games!">
  <title>Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/home.css">
</head>
<body> 

  <main class="home">
    <div class="content">
        <div class="tag">
            <img src="../assets/images/ui/Malaysia-flag.png" class="flag">
            Malaysia Adventure
        </div>

        <h2 class="title">
            CULTURE <br>
            <span class="title2">EXPLORE</span>
        </h2>

        <p class="subtitle">Jelajah Budaya Malaysia!</p>

        <p class="desc">
            Explore Malaysia’s 13 states, discover traditions, foods<br>
            and festivals — earn stamps as you go!
        </p>

    <!-- Speech bubbles -->
    <div class="home-bubble-row">
      <div class="home-bubble">Selamat<br>datang! 👋</div>
      <div class="home-bubble">Let's<br>explore! 🗺️</div>
    </div>

    <!-- Mascots -->
    <div class="home-mascots">

      <div class="home-mascot-block">
        <!-- 📸 IMAGE NEEDED: assets/images/mascots/rimau.png
             Export from Figma → Characters/Rimau — tiger mascot full body
             Replace the emoji below with: <img src="assets/images/mascots/rimau.png" class="home-mascot-img" alt="Rimau"> -->
        <div class="home-mascot-emoji" aria-hidden="true">🦁</div>
        <span class="home-mascot-name">Rimau</span>
        <span class="home-mascot-region">West Malaysia</span>
      </div>

      <div class="home-mascot-block">
        <!-- 📸 IMAGE NEEDED: assets/images/mascots/wak.png
             Export from Figma → Characters/Wak — hornbill mascot full body
             Replace the emoji below with: <img src="assets/images/mascots/wak.png" class="home-mascot-img home-mascot-img--wak" alt="Wak"> -->
        <div class="home-mascot-emoji home-mascot-emoji--wak" aria-hidden="true">🦜</div>
        <span class="home-mascot-name">Wak</span>
        <span class="home-mascot-region">East Malaysia</span>
      </div>

    </div>

    <button class="btn primary">Start Exploring! 🔍</button>
   
      <button class="btn secondary">❓ How to Play</button>
   
    </div>


    

  </main>

  <script type="module" src="../js/home.js"></script>
</body>
</html>
