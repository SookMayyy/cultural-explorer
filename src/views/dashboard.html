<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Home — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <div class="app-container">

  <!-- Topbar -->
  <header id="topbar" class="topbar"></header>

  <main class="dashboard-screen has-navbar">

    <!-- Hero: name + level -->
    <div class="dashboard-hero">
      <h2 class="dashboard-name" id="dash-name">Explorer</h2>
      <p class="dashboard-level" id="dash-level">🌱 Beginner Explorer</p>

      <!-- Personalised mascot greeting -->
      <div class="dash-greeting" id="dash-greeting" role="status" aria-live="polite">
        <span class="dash-greeting-text" id="dash-greeting-text">Welcome back!</span>
      </div>
    </div>

    <!-- Overall journey progress bar -->
    <div class="home-progress">
      <div class="home-progress-head">
        <span class="home-progress-title">🌏 My Journey</span>
        <span class="home-progress-label" id="home-progress-label">0 / 7 states</span>
      </div>
      <div class="home-progress-track">
        <div class="home-progress-fill" id="home-progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Four quick-access cards -->
    <h3 class="home-cards-heading">Where to next?</h3>
    <div class="home-cards">
      <a class="home-card home-card--map" href="map.html">
        <img class="home-card-icon" src="../assets/images/ui/map_home.png" alt="">
        <span class="home-card-title">Explore Map</span>
        <span class="home-card-sub">Discover 6 states</span>
      </a>
      <a class="home-card home-card--stamp" href="stampbook.html">
        <img class="home-card-icon" src="../assets/images/ui/stamp_book_home.png" alt="">
        <span class="home-card-title">Stamp Book</span>
        <span class="home-card-sub" id="home-stamp-sub">0 / 7 collected</span>
      </a>
      <a class="home-card home-card--quiz" id="home-card-quiz" href="map.html">
        <img class="home-card-icon" src="../assets/images/ui/brain_home.png" alt="">
        <span class="home-card-title">Activities</span>
        <span class="home-card-sub">Test what you know</span>
      </a>
      <a class="home-card home-card--shop" href="avatar.html">
        <img class="home-card-icon" src="../assets/images/ui/shop_home.png" alt="">
        <span class="home-card-title">Avatar Shop</span>
        <span class="home-card-sub" id="home-shop-sub">Buy new avatars</span>
      </a>
    </div>

  </main>

  <!-- Bottom navbar -->
  <nav id="navbar" class="navbar"></nav>

  </div><!-- end app-container -->

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
