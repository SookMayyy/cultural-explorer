<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Stamp Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/stampbook.css">
</head>
<body>

<div class="app-container">

  <!-- Topbar — rendered by stampbook.js -->
  <header id="topbar" class="topbar topbar--purple"></header>

  <main class="sb-main">

    <div class="sb-inner">

      <!-- Collection Progress card (Figma 38:7) -->
      <div class="sb-progress-card">
        <div class="sb-prog-left">
          <span class="sb-prog-label">Collection Progress</span>
          <div class="sb-track">
            <div class="sb-fill" id="sb-fill" style="width:0%"></div>
          </div>
          <span class="sb-prog-sub" id="sb-count">0 of 7 stamps earned</span>
        </div>
        <div class="sb-prog-big" id="sb-big">0/7</div>
      </div>

      <!-- Region sections (West / East Malaysia) — rendered by stampbook.js -->
      <div id="sb-sections"></div>

    </div>
  </main>

  <!-- Bottom navbar — rendered by stampbook.js -->
  <nav id="navbar"></nav>

  <!-- Hibiscus corner decorations — pinned to the frame's bottom corners (direct
       children of .app-container so they anchor to the frame, not the viewport,
       and sit above the navbar on every screen size). -->
  <img src="../assets/images/ui/mystampbook_left_corner.png"  class="sb-deco sb-deco--left"  alt="">
  <img src="../assets/images/ui/mystampbook_right_corner.png" class="sb-deco sb-deco--right" alt="">

</div>

<script type="module" src="../js/stampbook.js"></script>
</body>
</html>
