<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Enter State — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/narrative.css">
</head>
<body>

  <div class="app-container">

    <!-- Topbar — rendered by narrative.js.
         The .narrative-topbar modifier forces purple regardless of state colour. -->
    <header id="topbar" class="topbar narrative-topbar"></header>

    <main class="story-entry has-navbar" id="story-entry">

      <!-- ── Story-entry scene card ───────────────────────────────────────────
           A single framed "scene" card: state name banner + tagline, an
           illustrated state scene with Rimau and a welcome speech bubble, and
           a big "Let's Explore!" button that leads into the state's Mission Hub.
           📸 IMAGE NEEDED: assets/images/states/{stateId}-scene.png — full
           background illustration of the state. Falls back to a soft gradient
           tinted with the state colour until the art is exported. -->
      <section class="story-scene-card" id="story-scene-card">

        <!-- Ribbon banner with the state name -->
        <div class="story-banner">
          <span class="story-banner-text" id="story-state-name">State</span>
        </div>

        <!-- Tagline beneath the banner -->
        <p class="story-tagline" id="story-tagline">Tagline</p>

        <!-- Scene: mascot + speech bubble over the (placeholder) backdrop -->
        <div class="story-scene">

          <!-- 📸 IMAGE NEEDED: assets/characters/rimau-costume.png
               Rimau dressed in the state's traditional costume. Emoji fallback. -->
          <div class="story-mascot" id="story-mascot" aria-hidden="true">🐯</div>

          <!-- Welcome speech bubble — lines filled in by narrative.js -->
          <div class="story-bubble" role="status" aria-live="polite">
            <p class="story-bubble-line story-bubble-line--hi"  id="story-line-1">Welcome!</p>
            <p class="story-bubble-line"                        id="story-line-2"></p>
            <p class="story-bubble-line story-bubble-line--cta" id="story-line-3">There's so much to explore together!</p>
          </div>

        </div>

        <!-- Enter the Mission Hub -->
        <button class="story-help-btn" id="story-help-btn" type="button">
          Let's Explore!
        </button>

      </section>

    </main><!-- end .story-entry -->

    <!-- Bottom navbar — rendered by narrative.js -->
    <nav id="navbar"></nav>

  </div><!-- end .app-container -->

  <script type="module" src="../js/narrative.js"></script>
</body>
</html>
