<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — LokaLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="app-container">
  <main class="auth-screen">

   <div class="auth-split">

    <!-- ── Mascot side (left half) ── -->
    <aside class="auth-mascot-side" aria-hidden="true">
      <div class="auth-mascot-bubble auth-mascot-bubble--side">
        Hi friend! Type your name and let's play!
      </div>
      <div class="auth-mascot-fig auth-mascot-fig--lg">
        <img src="../assets/characters/rimau_happy.png" alt="">
      </div>
    </aside>

    <div class="auth-card">

      <a class="auth-back" href="home.html" aria-label="Back to home">&#8249;</a>

      <!-- ── Student login view ── -->
      <div id="view-student">
        <h1 class="auth-title">Welcome Back!</h1>
        <p class="auth-sub">Log in to keep exploring Malaysia.</p>

        <form id="form-login" class="auth-form" novalidate>
          <label class="auth-label" for="login-name">Your name</label>
          <input type="text" id="login-name" class="auth-input"
                 placeholder="Type your name" autocomplete="username" required>

          <label class="auth-label">Your grade</label>
          <div class="grade-select" id="login-grade" role="radiogroup" aria-label="Select your grade">
            <button type="button" class="grade-btn" role="radio" aria-checked="false" data-grade="1-3">Grade 1&ndash;3</button>
            <button type="button" class="grade-btn" role="radio" aria-checked="false" data-grade="4-6">Grade 4&ndash;6</button>
          </div>

          <label class="auth-label" for="login-password">Password</label>
          <div class="auth-pw-wrap">
            <input type="password" id="login-password" class="auth-input"
                   placeholder="Your password" autocomplete="current-password" required>
            <button type="button" class="auth-pw-toggle" id="toggle-login-pw"
                    aria-label="Show password" aria-pressed="false">
              <img class="auth-pw-icon" src="../assets/images/ui/show_password.png" alt="">
            </button>
          </div>

          <p class="form-error hidden" id="login-error" role="alert"></p>

          <button type="submit" class="auth-submit" id="btn-login">Log In</button>
          <button type="button" class="auth-link" id="link-forgot">Forgot your password?</button>
        </form>

        <div class="auth-divider"><span>new here?</span></div>

        <a class="auth-submit" href="signup.html" style="text-decoration:none;display:block;text-align:center;box-sizing:border-box;background:var(--clr-green)">
          Create an Account
        </a>

        <button type="button" class="auth-btn-ghost" id="btn-guest">
          Play as Guest (no account)
        </button>
      </div>

    </div><!-- end .auth-card -->

   </div><!-- end .auth-split -->
  </main>
</div>

<script type="module" src="../js/login.js"></script>
</body>
</html>
