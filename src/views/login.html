<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Log In — LokaLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

<div class="app-container">
  <main class="auth-screen">

   <div class="auth-split">

    <!-- ── Mascot side (left half) ── -->
    <aside class="auth-mascot-side" aria-hidden="true">
      <div class="auth-mascot-bubble auth-mascot-bubble--side">
        Hi friend! Type your name and let's play! 🐯
      </div>
      <div class="auth-mascot-fig auth-mascot-fig--lg">
        <img src="../assets/characters/rimau_happy.png" alt="">
      </div>
    </aside>

    <div class="auth-card">

      <a class="auth-back" href="home.html" aria-label="Back to home">&#8249;</a>

      <!-- ── Student login view ── -->
      <div id="view-student">
        <h1 class="auth-title">Welcome Back!</h1>
        <p class="auth-sub">Log in to keep exploring Malaysia.</p>

        <form id="form-login" class="auth-form" novalidate>
          <label class="auth-label" for="login-name">Your name</label>
          <input type="text" id="login-name" class="auth-input"
                 placeholder="Type your name" autocomplete="username" required>

          <label class="auth-label">Your grade</label>
          <div class="grade-select" id="login-grade" role="group" aria-label="Select your grade">
            <button type="button" class="grade-btn" data-grade="1-2">Grade 1&ndash;2</button>
            <button type="button" class="grade-btn" data-grade="3-4">Grade 3&ndash;4</button>
            <button type="button" class="grade-btn" data-grade="5-6">Grade 5&ndash;6</button>
          </div>

          <label class="auth-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="auth-input"
                 placeholder="Your password" autocomplete="current-password" required>

          <p class="form-error hidden" id="login-error" role="alert"></p>

          <button type="submit" class="auth-submit" id="btn-login">Log In &#128640;</button>
          <button type="button" class="auth-link" id="link-forgot">Forgot your password?</button>
        </form>

        <div class="auth-divider"><span>new here?</span></div>

        <a class="auth-submit" href="signup.html" style="text-decoration:none;display:block;text-align:center;box-sizing:border-box;background:var(--clr-green)">
          Create an Account &#127775;
        </a>

        <button type="button" class="auth-btn-ghost" id="btn-guest">
          &#128100; Play as Guest (no account)
        </button>

        <button type="button" class="auth-link" id="link-teacher">&#128273; Teacher Login</button>
      </div>

      <!-- ── Teacher login view ── -->
      <div id="view-teacher" class="hidden">
        <h1 class="auth-title">Teacher Login</h1>
        <p class="auth-sub">For teachers and class administrators.</p>

        <form id="form-teacher" class="auth-form" novalidate>
          <label class="auth-label" for="teacher-email">Email</label>
          <input type="email" id="teacher-email" class="auth-input"
                 placeholder="teacher@school.edu.my" autocomplete="email" required>

          <label class="auth-label" for="teacher-pass">Password</label>
          <input type="password" id="teacher-pass" class="auth-input"
                 placeholder="Password" autocomplete="current-password" required>

          <p class="form-error hidden" id="teacher-error" role="alert"></p>

          <button type="submit" class="auth-submit" id="btn-teacher">Log In</button>
          <button type="button" class="auth-link" id="link-back-student">&#8249; Back to student login</button>
        </form>
      </div>

    </div><!-- end .auth-card -->

   </div><!-- end .auth-split -->
  </main>
</div>

<script type="module" src="../js/login.js"></script>
</body>
</html>
