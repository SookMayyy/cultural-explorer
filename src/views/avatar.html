<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Avatar — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/avatar.css">
</head>
<body>

<div class="app-container av-screen">

  <!-- ════════════ Showcase (purple) ════════════ -->
  <section class="av-showcase">
    <!-- Points (top-left) + close (top-right) -->
    <div class="av-top-row">
      <div class="av-points" id="av-points">⭐ 0</div>
      <a class="av-close" href="settings.html" aria-label="Close">✕</a>
    </div>

    <!-- Big avatar preview: base animal + equipped costume overlay -->
    <div class="av-stage" id="av-stage" aria-live="polite">
      <span class="av-stage-base"    id="av-hero-base">🦧</span>
      <span class="av-stage-costume" id="av-hero-costume">👔</span>
    </div>

    <!-- Name + edit + shuffle -->
    <div class="av-name-row">
      <span class="av-name" id="av-name">Explorer</span>
      <button class="av-name-edit" id="av-name-edit" aria-label="Edit name">✎</button>
      <button class="av-shuffle" id="av-shuffle" aria-label="Surprise outfit">🎲</button>
    </div>
  </section>

  <!-- ════════════ Dark item panel ════════════ -->
  <main class="av-panel">

    <!-- Category tabs -->
    <div class="av-tabs" role="tablist">
      <button class="av-tab"        data-tab="animal"  role="tab" aria-selected="true">🐾 Character</button>
      <button class="av-tab"        data-tab="outfits" role="tab" aria-selected="false">👕 Outfits <span class="av-tab-soon">Soon</span></button>
    </div>

    <!-- Hint line for the active tab -->
    <p class="av-panel-hint" id="av-panel-hint">Pick your character — your outfit stays on top!</p>

    <!-- Item grid (built by avatar.js) -->
    <div class="av-items" id="av-grid" aria-label="Items"></div>

  </main>

  <!-- Bottom navigation bar -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="map-nav-item">
      <img src="../assets/images/ui/home-icon.png"   alt="" class="nav-icon"><span>Home</span>
    </a>
    <a href="map.html" class="map-nav-item">
      <img src="../assets/images/ui/my-map-icon.png" alt="" class="nav-icon"><span>Map</span>
    </a>
    <a href="stampbook.html" class="map-nav-item">
      <img src="../assets/images/ui/stamp-icon.png"  alt="" class="nav-icon"><span>Stamps</span>
    </a>
    <a href="quiz.html" class="map-nav-item">
      <img src="../assets/images/ui/quiz-icon.png"   alt="" class="nav-icon"><span>Quiz</span>
    </a>
    <a href="settings.html" class="map-nav-item active">
      <img src="../assets/images/ui/setting-icon.png" alt="" class="nav-icon"><span>Me</span>
    </a>
  </nav>

</div>

<script type="module" src="../js/avatar.js"></script>
</body>
</html>
