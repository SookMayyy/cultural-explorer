<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Cultural Explorer Malaysia - Learn about Malaysian states through fun games!">
  <title>LokaLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&family=Reggae+One&family=Rowdies:wght@300;400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/home.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════
       EXACT REPRODUCTION of Figma "Main Page" (293:2441).
       Fixed 1104×682 stage, scaled to fit the viewport by the inline
       script at the bottom. Coordinates/colours/fonts match the frame.
       ═══════════════════════════════════════════════════════════════════ -->
  <div class="proto-viewport">
    <div class="proto-stage" id="proto-stage">

      <!-- Page background image (element 33 — placeholder in Figma) -->
      <img class="pb-bg" src="../assets/images/ui/home-backgrounds.png" alt="">

      <!-- Mascot illustration (element 34 — Rimau the tiger) -->
      <div class="pb-illus" aria-hidden="true">
        <img src="../assets/characters/rimau_happy.png" alt="">
      </div>

      <!-- LOKALEARN wordmark -->
      <h1 class="pb-logo"><span class="pb-loka">LOKA</span><span class="pb-learn">LEARN</span></h1>

      <!-- Subtitle -->
      <p class="pb-subtitle">Jelajah Budaya Malaysia!</p>

      <!-- Description — state count filled in by home.js from STATE_COUNT -->
      <p class="pb-desc" id="pb-desc">Explore Malaysia&rsquo;s states, discover traditions, foods and festivals &mdash; earn stamps as you go!</p>

      <!-- Buttons (ids kept so home.js still wires the modals) -->
      <button class="pb-btn pb-start" id="btn-start">START GAME</button>
      <button class="pb-btn pb-how" id="btn-how-to-play">HOW TO PLAY</button>

    </div>
  </div>

  <!-- The login / register / recover / avatar flows live on their own screens
       (login.html → signup.html / recover.html). START GAME routes there; the
       old in-page modals were removed to keep a single auth surface. -->

  <script type="module" src="../js/home.js"></script>

  <!-- Scale the fixed 1104×682 stage to fill the viewport (allows upscaling so
       the landing page never leaves grey margins; the viewport's cover
       background fills any remaining letterbox on odd aspect ratios). -->
  <script>
    (function () {
      var stage = document.getElementById('proto-stage');
      function fit() {
        var s = Math.min(window.innerWidth / 1120, window.innerHeight / 698);
        stage.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
</body>
</html>
