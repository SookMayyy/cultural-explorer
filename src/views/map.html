<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Map — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&family=Reggae+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/map.css">
</head>
<body>

<div class="app-container">

  <!-- Topbar: map.js fills this with renderTopbar() — gets the purple override
       via .map-topbar class on the element (colour set in map.css) -->
  <header id="topbar" class="topbar map-topbar"></header>

  <!-- ── Main scrollable area containing the journey map ── -->
  <main class="map-main" id="map-main">

    <!-- Progress header: headline + "X/7 explored" pill -->
    <div class="map-progress-header">
      <p class="map-headline" id="map-headline">Choose a State!</p>
      <div class="map-progress-pill">
        <span id="map-completed">0/7</span>
        <span class="pill-sep">·</span>
        <span id="map-pts">0%</span>
      </div>
    </div>

    <!-- Thin progress bar under the header -->
    <div class="map-progress-bar-wrap">
      <div class="map-progress-bar-fill" id="map-progress-fill" style="width: 0%"></div>
    </div>

    <!-- Mascot row: Rimau with a short greeting bubble.
         map.js populates #map-mascot-figure + #map-mascot-text. -->
    <div class="map-mascot-row">
      <!-- 📸 IMAGE NEEDED: replace emoji with rimau.svg from assets/characters/.
           Use an <img> tag with the character illustration. -->
      <div class="map-mascot-figure" id="map-mascot-figure">🐯</div>
      <div class="map-mascot-bubble" id="map-mascot-text">
        Let's explore Malaysia together!
      </div>
    </div>

    <!-- ── Interactive Malaysia map ──
         The map.png fills the wrap; map.js injects one tappable marker per
         state (positioned by % coordinates) into #map-hotspots. Tapping a
         marker opens the state popup with the "Explore Now" CTA. -->
    <div class="map-image-wrap" id="map-image-wrap">
      <p class="map-caption">⭐ <span>SELECT A STATE TO LEARN!</span></p>
    <!-- Malaysia state geometry from simplemaps.com (free for commercial use). -->
    <svg id="map" class="my-map" viewBox="0 30 930 250" role="group" aria-label="Map of Malaysia — tap a state">

      <!-- Hover info-card (desktop pointer only). map.js fills + positions it when
           the pointer is over a state, so you can preview a state without tapping. -->
      <div class="map-hover hidden" id="map-hover" aria-hidden="true">
        <div class="map-hover-flag" id="map-hover-flag"></div>
        <div class="map-hover-body">
          <p class="map-hover-name" id="map-hover-name"></p>
          <p class="map-hover-tag"  id="map-hover-tag"></p>
          <p class="map-hover-sum"  id="map-hover-sum"></p>
        </div>
      </div>

      <!-- Calibration helper — open map.html?calibrate=1 then tap a state to
           read its left%/top% (legacy; kept for reference). -->
      <div class="map-calibrate hidden" id="map-cal">tap a state…</div>
    </div>

  </main>

  <!-- ── State detail popup (bottom sheet on mobile) ──
       Hidden by default. map.js shows it on node tap. -->
  <div id="map-popup" class="map-popup hidden" role="dialog" aria-modal="true"
       aria-labelledby="popup-name">
    <div class="map-popup-card">
      <button class="popup-close-btn" id="popup-close" aria-label="Close">✕</button>

      <!-- State identity header -->
      <div class="popup-header">
        <div class="popup-state-emoji" id="popup-emoji"></div>
        <div class="popup-header-text">
          <p id="popup-name"    class="popup-state-name"></p>
          <p id="popup-tagline" class="popup-state-tagline"></p>
        </div>
      </div>

      <!-- Tab completion badges: story / culture / activity / quiz
           map.js injects <span class="popup-badge [done]"> elements here -->
      <div id="popup-badges" class="popup-badges"></div>

      <!-- "Explore Now" button — map.js sets href + class (locked variant)
           Must be an <a> not a <button> so the browser handles navigation -->
      <a id="popup-explore" class="popup-explore-btn" href="#">
        Explore Now ›
      </a>
    </div>
  </div>

  <!-- Bottom navbar: map.js calls renderNavbar('map') to fill this.
       The .bottom-nav styles come from style.css (purple bar + yellow pill). -->
  <nav id="navbar"></nav>

</div>

<!-- ES module — auto-deferred by the browser, safe to put before </body> -->
<script type="module" src="../js/map.js"></script>
</body>
</html>
