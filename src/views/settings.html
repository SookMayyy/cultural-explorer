<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/settings.css">
</head>
<body>

<div class="app-container">

  <header class="topbar">
    <div class="topbar-left"></div>
    <div class="topbar-right">
      <div class="topbar-points" id="set-topbar-pts">⭐ 0 pts</div>
      <div class="topbar-avatar" id="set-topbar-avatar">👤</div>
    </div>
  </header>

  <main class="settings-main">

    <!-- Nature scene background overlay -->
    <div class="settings-overlay"></div>

    <div class="settings-layout">

      <!-- Left: Profile card -->
      <div class="profile-card">
        <div class="profile-avatar" id="set-avatar">👤</div>
        <h2 class="profile-name"><span id="set-name">Explorer</span></h2>
        <p class="profile-level" id="set-level">🌱 Beginner Explorer</p>

        <div class="profile-stats">
          <div class="stat-item">
            <span class="stat-val" id="set-stamps">0</span>
            <span class="stat-key">Stamps</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-val" id="set-quizzes">0</span>
            <span class="stat-key">Quizzes</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-val" id="set-complete">0%</span>
            <span class="stat-key">Complete</span>
          </div>
        </div>

        <button class="logout-btn" id="btn-logout">
          <span aria-hidden="true">🚪</span> Log Out
        </button>
        <button class="reset-link" id="btn-reset">↺ Reset Progress</button>
      </div>

      <!-- Right: Menu cards 2×2 -->
      <div class="menu-grid">

        <!-- Link to the new Avatar Shop page -->
        <a href="avatar.html" class="menu-card menu-card--avatar">
          <span class="menu-icon menu-icon--emoji" aria-hidden="true">&#129409;</span>
          <span class="menu-label">Avatar Shop</span>
          <span class="menu-arrow">&#8250;</span>
        </a>

        <button class="menu-card" id="btn-guide">
          <img src="../assets/images/ui/setting_guide.png"    alt="" class="menu-icon">
          <span class="menu-label">Game Guide</span>
          <span class="menu-arrow">&#8250;</span>
        </button>

        <button class="menu-card" id="btn-safety">
          <img src="../assets/images/ui/setting_safety.png"   alt="" class="menu-icon">
          <span class="menu-label">Student Safety</span>
          <span class="menu-arrow">&#8250;</span>
        </button>

        <button class="menu-card" id="btn-sound">
          <span class="menu-icon menu-icon--emoji" id="sound-icon" aria-hidden="true">🔊</span>
          <span class="menu-label" id="sound-label">Sound: On</span>
          <span class="menu-arrow" id="sound-state">›</span>
        </button>

      </div>

    </div>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="map-nav-item">
      <img src="../assets/images/ui/home-icon.png"   alt="" class="nav-icon">
      <span>Home</span>
    </a>
    <a href="map.html" class="map-nav-item">
      <img src="../assets/images/ui/my-map-icon.png" alt="" class="nav-icon">
      <span>Map</span>
    </a>
    <a href="stampbook.html" class="map-nav-item">
      <img src="../assets/images/ui/stamp-icon.png"  alt="" class="nav-icon">
      <span>Stamps</span>
    </a>
    <a href="activities.html" class="map-nav-item">
      <img src="../assets/images/ui/quiz-icon.png"   alt="" class="nav-icon">
      <span>Activities</span>
    </a>
    <a href="settings.html" class="map-nav-item active">
      <img src="../assets/images/ui/setting-icon.png" alt="" class="nav-icon">
      <span>Me</span>
    </a>
  </nav>

</div>
<script type="module" src="../js/settings.js"></script>
</body>
</html>
