<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Match the Culture! — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/activity.css">
</head>
<body>

<div class="app-container">

  <!-- Shared topbar (back button + points + avatar), rendered by activity.js via
       renderTopbar() — same as every other mini-game. This screen used to carry
       its own bespoke HUD with a "BACK TO MAP" pill, which made its back button
       the odd one out. -->
  <header class="topbar" id="topbar"></header>

  <!-- Progress strip: what remains of the old HUD, now a slim bar of its own
       below the topbar (mirrors .quiz-progress-strip). -->
  <div class="act-strip">
    <div class="act-progress-area">
      <div class="act-progress-labels">
        <span class="act-plabel-left">LEVEL PROGRESS</span>
        <span class="act-plabel-right" id="act-matched-text">0 / 0 MATCHED</span>
      </div>
      <div class="act-progress-track">
        <!-- Width driven by activity.js via inline style — starts at 0% -->
        <div class="act-progress-fill" id="act-progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- ── Main scrollable area ──────────────────────────────────────────────── -->
  <main class="act-main">

    <!-- DragMatch component renders its 3-column layout into this div -->
    <div class="act-game-area" id="act-game-area">
      <div class="act-loading">Loading activity…</div>
    </div>

    <!-- Completion overlay — hidden until all pairs are matched.
         Positioned absolute over .act-main so it covers the game area. -->
    <div class="act-complete hidden" id="act-complete">
      <div class="act-complete-card">
        <div class="act-complete-emoji" id="act-complete-emoji">🎉</div>
        <h3 class="act-complete-title">All Matched!</h3>
        <p class="act-complete-sub" id="act-complete-sub">Great job! You matched everything.</p>
        <div class="act-complete-actions">
          <a class="btn-act-quiz" id="btn-to-quiz" href="guess.html">
            🔍 Next: Guess My State
          </a>
          <a class="btn-act-map" href="map.html">
            🗺️ Back to Map
          </a>
        </div>
      </div>
    </div>

  </main>

  <!-- ── Mascot corner (Rimau, bottom-left) ────────────────────────────────
       Absolutely positioned inside .app-container so it floats above the
       game layout. The speech bubble tail points down toward Rimau.
       activity.js renders the mascot image and updates the bubble text.      -->
  <div class="act-mascot-corner" id="act-mascot-corner" aria-live="polite">
    <div class="act-bubble" id="act-bubble">
      <p id="act-bubble-text">Can you match each clue to the right state?</p>
    </div>
    <!-- Rimau image + emoji fallback rendered by activity.js via renderMascot() -->
    <div class="act-mascot-fig" id="act-mascot-fig">🐯</div>
  </div>

  <!-- The "?" help button is mounted by howToPlay.js (initHowToPlay below) — it
       re-opens the illustrated instructions. No separate hint button here, so the
       screen shows a single "?" instead of two. -->

  <!-- Bottom nav, rendered by activity.js via renderNavbar() — it used to be
       hardcoded here and so drifted from the shared one. -->
  <nav class="bottom-nav" id="navbar"></nav>

</div><!-- /.app-container -->

<script type="module" src="../js/activity.js"></script>
</body>
</html>
