<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Match the Culture! — Cultural Explorer MY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka+One&family=Ribeye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/activity.css">
</head>
<body>

<div class="app-container">

  <!-- Topbar: back button + state name + points + avatar -->
  <header class="topbar" id="topbar" style="background: #E67E22;">
    <div class="topbar-left">
      <a class="topbar-back" id="topbar-back" href="narrative.html" aria-label="Back"><img src="../assets/images/ui/back-button.png" alt=""></a>
      <span class="topbar-title" id="topbar-title">Match the Culture!</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-points" id="topbar-pts">&#11088; 0 pts</div>
      <div class="topbar-avatar" id="topbar-avatar">&#128100;</div>
    </div>
  </header>

  <!-- Progress / intro banner -->
  <div class="act-banner" id="act-banner">
    <!-- Mascot greeting -->
    <div class="act-mascot-row">
      <span class="act-mascot">&#129409;</span>
      <div class="act-bubble" id="act-bubble">
        <p id="act-bubble-text">Can you match each food to the right state?</p>
      </div>
    </div>
    <!-- Round indicator pill -->
    <div class="act-round-pill" id="act-round-pill">Activity 1 of 7</div>
  </div>

  <!-- ── Main game area ── -->
  <main class="act-main">

    <!-- Title row: game name + score badge -->
    <div class="act-header-row">
      <h2 class="act-title" id="act-game-title">&#127869; Food Match!</h2>
      <span class="act-score-badge" id="act-score">0 matched</span>
    </div>

    <!-- Game container — DragMatch component renders into this div -->
    <div class="act-game-area" id="act-game-area">
      <!-- Filled by activity.js via DragMatch.render() -->
      <div class="act-loading">Loading activity&#8230;</div>
    </div>

    <!-- Completion overlay — hidden until all pairs are matched -->
    <div class="act-complete hidden" id="act-complete">
      <div class="act-complete-card">
        <div class="act-complete-emoji" id="act-complete-emoji">&#127881;</div>
        <h3 class="act-complete-title">All Matched!</h3>
        <p class="act-complete-sub" id="act-complete-sub">Great job! You matched everything.</p>
        <div class="act-complete-actions">
          <a class="btn-act-quiz" id="btn-to-quiz" href="guess.html">
            &#128269; Next: Guess My State
          </a>
          <a class="btn-act-map" href="map.html">
            &#128506;&#65039; Back to Map
          </a>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom navigation bar (purple, image icons) -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="map-nav-item">
      <img src="../assets/images/ui/home-icon.png"   alt="" class="nav-icon">
      <span>Home</span>
    </a>
    <a href="map.html" class="map-nav-item active">
      <img src="../assets/images/ui/my-map-icon.png" alt="" class="nav-icon">
      <span>Map</span>
    </a>
    <a href="stampbook.html" class="map-nav-item">
      <img src="../assets/images/ui/stamp-icon.png"  alt="" class="nav-icon">
      <span>Stamps</span>
    </a>
    <a href="quiz.html" class="map-nav-item">
      <img src="../assets/images/ui/quiz-icon.png"   alt="" class="nav-icon">
      <span>Quiz</span>
    </a>
    <a href="settings.html" class="map-nav-item">
      <img src="../assets/images/ui/setting-icon.png" alt="" class="nav-icon">
      <span>Me</span>
    </a>
  </nav>

</div>

<script type="module" src="../js/activity.js"></script>
</body>
</html>
