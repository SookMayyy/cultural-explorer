<!DOCTYPE html>
<html lang="en">
<link href="https://fonts.googleapis.com/css2?family=Comic+Relief&family=Racing+Sans+One&family=Ribeye&family=Reggae+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/app.js"></script>
<head>
    <meta charset="UTF-8">
    <title>Cultural Explorer MY</title>
</head>

<body>

    <!-- HEADER -->
    <header class="top-bar">
        <div class="left">
            <div class="logo">logo</div>
            <h1>Cultural Explorer <span>MY</span></h1>
        </div>

        <div class="right">
            ⭐ 150 pts
            <div class="profile">P</div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="home">

        <!-- Decorative Corners (Replace with your images) -->
        <img src="assets/images/ui/top-left.png" class="corner top-left">
        <img src="assets/images/ui/top-right.png" class="corner top-right">
        <img src="assets/images/ui/bottom-left.png" class="corner bottom-left">
        <img src="assets/images/ui/bottom-right.png" class="corner bottom-right">

        <!-- Content -->
        <div class="content">

            <div class="tag">
                <span><img src="assets/images/ui/Malaysia-flag.png" class="flag"></span> Malaysia Adventure
            </div>

            <h2 class="title">CULTURE<span class="title2"><br>EXPLORE</span></h2>

            <p class="subtitle">Jelajah Budaya Malaysia!</p>

            <p class="desc">
                Explore Malaysia’s 13 states, discover traditions, foods<br>
                and festivals — earn stamps as you go!
            </p>

            <button class="btn primary">
                Start Exploring! 🔍
            </button>

            <button class="btn secondary">
                START
            </button>

        </div>

    </main>

  </body>
</html>
